name: ci
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (test extra only — the library itself is zero-dependency)
        run: pip install -e ".[test]"
      - name: Tests
        run: python -m pytest -q
      - name: Offline integrity demo (no model — the seal/prereg differentiator)
        run: python examples/verify_seal_breaks.py
